<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iDone Chatbot Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <i class="fas fa-robot text-2xl"></i>
                    <span class="font-bold text-xl">iDone Chatbot Manager</span>
                </div>
                <div class="flex items-center gap-4">
                    <input type="password" id="adminKeyInput" placeholder="Admin API Key" 
                        class="text-sm bg-blue-700 px-3 py-1 rounded-full border border-blue-500 placeholder-blue-300 text-white focus:outline-none focus:border-white w-48"
                        oninput="localStorage.setItem('adminKey', this.value)"
                        onchange="localStorage.setItem('adminKey', this.value); loadTenants();">
                    <span id="systemStatus" class="text-sm bg-blue-700 px-3 py-1 rounded-full">
                        <i class="fas fa-circle text-xs mr-1" id="statusDot"></i>
                        <span id="statusText">Checking...</span>
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                    <div class="p-6 border-b border-gray-200">
                        <h2 class="text-xl font-semibold text-gray-800">
                            <i class="fas fa-users text-blue-600 mr-2"></i>Tenants
                        </h2>
                    </div>
                    <div class="p-6">
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="text-left text-sm text-gray-500 border-b">
                                        <th class="pb-3 font-medium">Name</th>
                                        <th class="pb-3 font-medium">Status</th>
                                        <th class="pb-3 font-medium">Documents</th>
                                        <th class="pb-3 font-medium">Chats</th>
                                        <th class="pb-3 font-medium">Created</th>
                                        <th class="pb-3 font-medium">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="tenantTableBody">
                                    <tr>
                                        <td colspan="6" class="py-8 text-center text-gray-500">
                                            <div class="spinner mx-auto mb-2"></div>
                                            Loading tenants...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">
                        <i class="fas fa-plus-circle text-green-600 mr-2"></i>Add New Tenant
                    </h2>
                    <form id="addTenantForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tenant Name</label>
                            <input type="text" id="tenantName" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                                placeholder="e.g., Acme Corp">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">System Prompt</label>
                            <textarea id="tenantSystemPrompt" rows="4"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                                placeholder="You are a helpful assistant..."></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">LLM Model</label>
                                <select id="tenantModel"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                    <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
                                    <option value="llama-3.1-70b-versatile">Llama 3.1 70B</option>
                                    <option value="llama-3.1-405b-reasoning">Llama 3.1 405B</option>
                                    <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Temperature</label>
                                <input type="number" id="tenantTemperature" step="0.1" min="0" max="2" value="0.7"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                        <button type="submit"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition flex items-center justify-center gap-2">
                            <i class="fas fa-plus"></i>Create Tenant
                        </button>
                    </form>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">
                        <i class="fas fa-upload text-purple-600 mr-2"></i>Upload Knowledge Base
                    </h2>
                    <form id="uploadForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Select Tenant</label>
                            <select id="uploadTenantSelect" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="">Choose a tenant...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Text Content</label>
                            <textarea id="uploadText" rows="4"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                placeholder="Paste your knowledge base text here..."></textarea>
                        </div>
                        <div class="text-center text-gray-500 text-sm">OR</div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Upload Files (Multiple)</label>
                            <input type="file" id="uploadFile" accept=".txt,.pdf,.docx" multiple
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <p class="text-xs text-gray-500 mt-1">Select multiple files using Ctrl/Cmd + Click</p>
                        </div>
                        <button type="submit"
                            class="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded-lg transition flex items-center justify-center gap-2">
                            <i class="fas fa-upload"></i>Upload & Index
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Document Management Section -->
        <div class="mt-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                    <h2 class="text-xl font-semibold text-gray-800">
                        <i class="fas fa-folder text-blue-600 mr-2"></i>Document Management
                    </h2>
                    <button onclick="loadAllDocuments()" class="text-blue-600 hover:text-blue-800 text-sm">
                        <i class="fas fa-sync-alt mr-1"></i>Refresh
                    </button>
                </div>
                <div class="p-6">
                    <div id="documentTableContainer">
                        <p class="text-gray-500 text-center py-4">Select a tenant above to view their documents</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300">
        <span id="toastMessage"></span>
    </div>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-semibold" id="modalTitle">Edit Tenant</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6" id="modalContent"></div>
        </div>
    </div>

    <!-- Edit Document Modal -->
    <div id="editDocModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-semibold" id="editDocModalTitle">Edit Document</h3>
                <button onclick="closeEditDocModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <textarea id="editDocContent" rows="20"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm"></textarea>
                <div class="mt-4 flex gap-3">
                    <button onclick="saveDocumentEdit()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg">
                        <i class="fas fa-save mr-2"></i>Save Changes
                    </button>
                    <button onclick="closeEditDocModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://chat.idone.co.il';
        let tenants = [];
        let currentEditTenant = null;
        let currentEditingDoc = null;
        let selectedTenantForDocs = null;

        // ==================== Document Management ====================

        async function loadAllDocuments() {
            const container = document.getElementById('documentTableContainer');
            const tenantSelect = document.getElementById('uploadTenantSelect');
            const selectedTenantId = tenantSelect.value;
            
            if (!selectedTenantId) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">Please select a tenant above to view their documents</p>';
                return;
            }
            
            selectedTenantForDocs = selectedTenantId;
            container.innerHTML = '<div class="text-center py-4"><div class="spinner mx-auto"></div><p class="mt-2">Loading documents...</p></div>';
            
            try {
                const res = await fetch(`${API_BASE}/admin/tenants/${selectedTenantId}/documents`, {
                    headers: { 'X-Admin-Key': getAdminKey() }
                });
                
                if (!res.ok) throw new Error('Failed to load documents');
                
                const documents = await res.json();
                
                if (documents.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center py-4">No documents uploaded yet for this tenant</p>';
                    return;
                }
                
                container.innerHTML = `
                    <table class="w-full">
                        <thead>
                            <tr class="text-left text-sm text-gray-500 border-b">
                                <th class="pb-3 font-medium">Filename</th>
                                <th class="pb-3 font-medium">Type</th>
                                <th class="pb-3 font-medium">Chunks</th>
                                <th class="pb-3 font-medium">Indexed</th>
                                <th class="pb-3 font-medium">Created</th>
                                <th class="pb-3 font-medium">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${documents.map(doc => `
                                <tr class="border-b hover:bg-gray-50">
                                    <td class="py-3 font-medium text-gray-800">${doc.filename}</td>
                                    <td class="py-3 text-gray-600">${doc.file_type.toUpperCase()}</td>
                                    <td class="py-3 text-gray-600">${doc.chunk_count}</td>
                                    <td class="py-3">
                                        <span class="px-2 py-1 rounded-full text-xs font-medium ${doc.is_indexed ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                            ${doc.is_indexed ? 'Yes' : 'No'}
                                        </span>
                                    </td>
                                    <td class="py-3 text-gray-500 text-sm">${new Date(doc.created_at).toLocaleDateString()}</td>
                                    <td class="py-3">
                                        ${doc.file_type === 'txt' ? `
                                            <button onclick="editDocument('${doc.id}', '${doc.filename}')" class="text-blue-600 hover:text-blue-800 mr-3" title="Edit">
                                                <i class="fas fa-edit"></i>
                                            </button>
                                        ` : ''}
                                        <button onclick="deleteDocument('${doc.id}', '${doc.filename}')" class="text-red-600 hover:text-red-800" title="Delete">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                container.innerHTML = `<p class="text-red-500 text-center py-4">Error loading documents: ${e.message}</p>`;
            }
        }

        async function deleteDocument(docId, filename) {
            if (!confirm(`Are you sure you want to delete "${filename}"? This will also remove all vector embeddings.`)) {
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/admin/tenants/${selectedTenantForDocs}/documents/${docId}`, {
                    method: 'DELETE',
                    headers: { 'X-Admin-Key': getAdminKey() }
                });
                
                if (!res.ok) throw new Error('Failed to delete document');
                
                showToast('Document deleted successfully');
                loadAllDocuments();
            } catch (e) {
                showToast('Error deleting document: ' + e.message, 'error');
            }
        }

        async function editDocument(docId, filename) {
            currentEditingDoc = { id: docId, tenantId: selectedTenantForDocs, filename: filename };
            
            document.getElementById('editDocModalTitle').textContent = `Edit: ${filename}`;
            document.getElementById('editDocContent').value = 'Loading document content...';
            
            document.getElementById('editDocModal').classList.remove('hidden');
            document.getElementById('editDocModal').classList.add('flex');
            
            try {
                const res = await fetch(`${API_BASE}/admin/tenants/${selectedTenantForDocs}/documents/${docId}`, {
                    headers: { 'X-Admin-Key': getAdminKey() }
                });
                
                if (!res.ok) throw new Error('Failed to load document');
                
                const doc = await res.json();
                document.getElementById('editDocContent').value = doc.content || 'No content available';
            } catch (e) {
                document.getElementById('editDocContent').value = 'Error loading content: ' + e.message;
            }
        }

        async function saveDocumentEdit() {
            if (!currentEditingDoc) return;
            
            const newContent = document.getElementById('editDocContent').value;
            
            try {
                const res = await fetch(`${API_BASE}/admin/tenants/${currentEditingDoc.tenantId}/documents/${currentEditingDoc.id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Key': getAdminKey()
                    },
                    body: JSON.stringify({ text: newContent })
                });
                
                if (!res.ok) throw new Error('Failed to update document');
                
                showToast('Document updated successfully');
                closeEditDocModal();
                loadAllDocuments();
            } catch (e) {
                showToast('Error updating document: ' + e.message, 'error');
            }
        }

        function closeEditDocModal() {
            document.getElementById('editDocModal').classList.add('hidden');
            document.getElementById('editDocModal').classList.remove('flex');
            currentEditingDoc = null;
        }

        // ==================== Existing Functions ====================

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.className = `fixed bottom-4 right-4 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white px-6 py-3 rounded-lg shadow-lg transition-all duration-300`;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function getAdminKey() {
            const input = document.getElementById('adminKeyInput');
            return input && input.value ? input.value : localStorage.getItem('adminKey') || '';
        }

        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                if (data.status === 'healthy') {
                    dot.className = 'fas fa-circle text-xs mr-1 text-green-400';
                    text.textContent = 'System Healthy';
                } else {
                    dot.className = 'fas fa-circle text-xs mr-1 text-yellow-400';
                    text.textContent = 'System Degraded';
                }
            } catch (e) {
                document.getElementById('statusDot').className = 'fas fa-circle text-xs mr-1 text-red-400';
                document.getElementById('statusText').textContent = 'System Offline';
            }
        }

        async function loadTenants() {
            try {
                const res = await fetch(`${API_BASE}/admin/tenants`, {
                    headers: { 'X-Admin-Key': getAdminKey() || prompt('Enter admin key:') || '' }
                });
                if (!res.ok) throw new Error('Failed to load tenants');
                tenants = await res.json();
                renderTenantTable();
                updateTenantSelect();
            } catch (e) {
                document.getElementById('tenantTableBody').innerHTML = `
                    <tr><td colspan="6" class="py-8 text-center text-red-500">Error loading tenants: ${e.message}</td></tr>`;
            }
        }

        function renderTenantTable() {
            const tbody = document.getElementById('tenantTableBody');
            if (tenants.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-gray-500">No tenants yet. Create one to get started!</td></tr>`;
                return;
            }
            tbody.innerHTML = tenants.map(t => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="py-4 font-medium text-gray-800">${t.name}</td>
                    <td class="py-4">
                        <span class="px-2 py-1 rounded-full text-xs font-medium ${t.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${t.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td class="py-4 text-gray-600">${t.document_count || 0}</td>
                    <td class="py-4 text-gray-600">${t.chat_count || 0}</td>
                    <td class="py-4 text-gray-500 text-sm">${new Date(t.created_at).toLocaleDateString()}</td>
                    <td class="py-4">
                        <button onclick="viewTenant('${t.id}')" class="text-blue-600 hover:text-blue-800 mr-2" title="View/Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="copyApiKey('${t.id}')" class="text-gray-600 hover:text-gray-800 mr-2" title="Copy API Key">
                            <i class="fas fa-key"></i>
                        </button>
                        <button onclick="deleteTenant('${t.id}')" class="text-red-600 hover:text-red-800" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function updateTenantSelect() {
            const select = document.getElementById('uploadTenantSelect');
            select.innerHTML = '<option value="">Choose a tenant...</option>' +
                tenants.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            
            select.onchange = function() {
                if (this.value) {
                    loadAllDocuments();
                }
            };
        }

        async function viewTenant(id) {
            try {
                const res = await fetch(`${API_BASE}/admin/tenants/${id}`, {
                    headers: { 'X-Admin-Key': getAdminKey() || '' }
                });
                const tenant = await res.json();
                currentEditTenant = tenant;
                document.getElementById('modalTitle').textContent = `Edit: ${tenant.name}`;
                document.getElementById('modalContent').innerHTML = `
                    <form id="editTenantForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                            <input type="text" id="editName" value="${tenant.name}" required class="w-full px-3 py-2 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">System Prompt</label>
                            <textarea id="editSystemPrompt" rows="4" class="w-full px-3 py-2 border rounded-lg">${tenant.system_prompt}</textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">LLM Model</label>
                                <select id="editModel" class="w-full px-3 py-2 border rounded-lg">
                                    <option value="llama-3.1-8b-instant" ${tenant.llm_model === 'llama-3.1-8b-instant' ? 'selected' : ''}>Llama 3.1 8B (Fast)</option>
                                    <option value="llama-3.1-70b-versatile" ${tenant.llm_model === 'llama-3.1-70b-versatile' ? 'selected' : ''}>Llama 3.1 70B</option>
                                    <option value="llama-3.1-405b-reasoning" ${tenant.llm_model === 'llama-3.1-405b-reasoning' ? 'selected' : ''}>Llama 3.1 405B</option>
                                    <option value="mixtral-8x7b-32768" ${tenant.llm_model === 'mixtral-8x7b-32768' ? 'selected' : ''}>Mixtral 8x7B</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Temperature</label>
                                <input type="number" id="editTemperature" step="0.1" min="0" max="2" value="${tenant.temperature}" class="w-full px-3 py-2 border rounded-lg">
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="editActive" ${tenant.is_active ? 'checked' : ''} class="rounded">
                            <label for="editActive" class="text-sm text-gray-700">Active</label>
                        </div>
                        <div class="bg-gray-100 p-4 rounded-lg">
                            <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                            <code class="text-xs bg-gray-200 px-2 py-1 rounded break-all">${tenant.api_key}</code>
                        </div>
                        <div class="flex gap-3">
                            <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Save Changes</button>
                            <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
                        </div>
                    </form>
                `;
                document.getElementById('modal').classList.remove('hidden');
                document.getElementById('modal').classList.add('flex');
                document.getElementById('editTenantForm').addEventListener('submit', handleEditSubmit);
            } catch (e) {
                showToast('Error loading tenant', 'error');
            }
        }

        async function handleEditSubmit(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('editName').value,
                system_prompt: document.getElementById('editSystemPrompt').value,
                llm_model: document.getElementById('editModel').value,
                temperature: parseFloat(document.getElementById('editTemperature').value),
                is_active: document.getElementById('editActive').checked
            };
            try {
                const res = await fetch(`${API_BASE}/admin/tenants/${currentEditTenant.id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Key': getAdminKey() || ''
                    },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Failed to update');
                showToast('Tenant updated successfully');
                closeModal();
                loadTenants();
            } catch (e) {
                showToast('Error updating tenant', 'error');
            }
        }

        async function deleteTenant(id) {
            if (!confirm('Are you sure you want to delete this tenant? This action cannot be undone.')) return;
            try {
                const res = await fetch(`${API_BASE}/admin/tenants/${id}`, {
                    method: 'DELETE',
                    headers: { 'X-Admin-Key': getAdminKey() || '' }
                });
                if (!res.ok) throw new Error('Failed to delete');
                showToast('Tenant deleted');
                loadTenants();
            } catch (e) {
                showToast('Error deleting tenant', 'error');
            }
        }

        async function copyApiKey(id) {
            const tenant = tenants.find(t => t.id === id);
            if (tenant) {
                try {
                    const res = await fetch(`${API_BASE}/admin/tenants/${id}`, {
                        headers: { 'X-Admin-Key': getAdminKey() || '' }
                    });
                    const t = await res.json();
                    await navigator.clipboard.writeText(t.api_key);
                    showToast('API key copied to clipboard');
                } catch (e) {
                    showToast('Error copying API key', 'error');
                }
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        document.getElementById('addTenantForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('tenantName').value,
                system_prompt: document.getElementById('tenantSystemPrompt').value || 'You are a helpful assistant.',
                llm_model: document.getElementById('tenantModel').value,
                temperature: parseFloat(document.getElementById('tenantTemperature').value)
            };
            try {
                const res = await fetch(`${API_BASE}/admin/tenants`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Key': getAdminKey() || ''
                    },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Failed to create tenant');
                const tenant = await res.json();
                showToast('Tenant created! API Key: ' + tenant.api_key.substring(0, 20) + '...');
                e.target.reset();
                loadTenants();
            } catch (e) {
                showToast('Error creating tenant', 'error');
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tenantId = document.getElementById('uploadTenantSelect').value;
            const text = document.getElementById('uploadText').value;
            const files = document.getElementById('uploadFile').files;
            
            if (!tenantId) {
                showToast('Please select a tenant', 'error');
                return;
            }
            if (!text && files.length === 0) {
                showToast('Please provide text or upload a file', 'error');
                return;
            }

            try {
                if (files.length > 0) {
                    const formData = new FormData();
                    for (let i = 0; i < files.length; i++) {
                        formData.append('files', files[i]);
                    }
                    
                    showToast(`Uploading ${files.length} file(s)...`, 'success');
                    
                    const res = await fetch(`${API_BASE}/admin/tenants/${tenantId}/documents`, {
                        method: 'POST',
                        headers: { 'X-Admin-Key': getAdminKey() },
                        body: formData
                    });
                    
                    if (!res.ok) throw new Error('Upload failed');
                    const result = await res.json();
                    
                    if (result.success) {
                        showToast(`Successfully uploaded ${result.successful} of ${result.total_files} file(s)`);
                    } else {
                        showToast(`Uploaded ${result.successful}/${result.total_files} file(s). ${result.failed} failed.`, 'error');
                    }
                    
                    loadAllDocuments();
                } else if (text) {
                    const res = await fetch(`${API_BASE}/api/ingest/${tenantId}/text`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                            'X-Api-Key': await getTenantApiKey(tenantId)
                        },
                        body: `text=${encodeURIComponent(text)}&filename=text_input.txt`
                    });
                    if (!res.ok) throw new Error('Upload failed');
                    const result = await res.json();
                    showToast(`Indexed! Created ${result.chunks_created} chunks`);
                    loadAllDocuments();
                }
                e.target.reset();
            } catch (e) {
                showToast('Error uploading: ' + e.message, 'error');
            }
        });

        async function getTenantApiKey(tenantId) {
            const res = await fetch(`${API_BASE}/admin/tenants/${tenantId}`, {
                headers: { 'X-Admin-Key': getAdminKey() || '' }
            });
            const t = await res.json();
            return t.api_key;
        }

        checkHealth();
        const savedKey = localStorage.getItem('adminKey');
        if (savedKey) {
            document.getElementById('adminKeyInput').value = savedKey;
            loadTenants();
        } else {
            loadTenants();
        }
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
