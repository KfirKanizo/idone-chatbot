services:
  # -----------------------------------------------------------------------------
  # PostgreSQL Database
  # -----------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: idone_postgres
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - idone_network
    restart: unless-stopped

  # -----------------------------------------------------------------------------
  # Qdrant Vector Database (Internal - not exposed to host)
  # -----------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: idone_qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
      - "6334"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - idone_network
    restart: unless-stopped

  # -----------------------------------------------------------------------------
  # FastAPI Backend (NPM managed)
  # -----------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idone_chat_api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - idone_network
      - proxy_network
    restart: unless-stopped

  # -----------------------------------------------------------------------------
  # Frontend (NPM managed)
  # -----------------------------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: idone_chat_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - idone_network
      - proxy_network
    restart: unless-stopped

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  idone_network:
    external: true
    name: idone_network
  proxy_network:
    external: true
    name: ${DOCKER_NETWORK:-proxy-network}

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
  qdrant_data:
